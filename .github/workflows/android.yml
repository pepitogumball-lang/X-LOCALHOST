name: X-LOCALHOST Ultra-Premium CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build Android APK
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle assembleDebug --no-daemon

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build PC Version
        run: |
          pip install pyinstaller
          pyinstaller --onefile --windowed --name "X-LOCALHOST-PC-Workstation-Pro" pc_version.py

      - name: Corporate Artifact Management
        run: |
          # 1. Ensure clean directories
          mkdir -p Mobile
          mkdir -p PC
          
          # 2. Delete legacy versions (Auto-Clean)
          rm -rf Mobile/*
          rm -rf PC/*
          
          # 3. Rename and Deploy Mobile Elite Edition
          cp app/build/outputs/apk/debug/app-debug.apk "Mobile/X-LOCALHOST-Mobile-Elite-Edition.apk"
          
          # 4. Rename and Deploy PC Workstation Pro
          # Note: pyinstaller on linux creates a linux binary. For a real .exe we'd need a windows runner.
          # We provide the binary and the source for maximum compatibility.
          if [ -f dist/X-LOCALHOST-PC-Workstation-Pro ]; then
            cp dist/X-LOCALHOST-PC-Workstation-Pro "PC/X-LOCALHOST-PC-Workstation-Pro"
          fi
          cp pc_version.py "PC/X-LOCALHOST-PC-Source.py"

      - name: Synchronize to GitHub Elite Repository
        run: |
          git config --global user.name "Flinger Apps Elite CI"
          git config --global user.email "elite-ci@flingerapps.com"
          git add Mobile/ PC/
          git commit -m "Deployment: Update X-LOCALHOST Elite & Pro Editions (Auto-Cleaned)" || echo "No changes"
          git push origin main

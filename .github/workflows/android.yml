name: X-LOCALHOST Premium CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build Android APK
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle assembleDebug --no-daemon

      - name: Set up Python (for PC Version)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller (for PC .exe)
        run: pip install pyinstaller

      - name: Build PC Executable
        run: |
          # Note: This runs on Linux, so it creates a Linux binary. 
          # To create a real .exe, we would need a Windows runner, 
          # but for now we'll package the script and simulate the structure.
          pyinstaller --onefile --windowed --name "X-LOCALHOST-PC-Workstation-Pro" pc_version.py

      - name: Organize Artifacts
        run: |
          # Create folders
          mkdir -p Mobile
          mkdir -p PC
          
          # Clean old versions
          rm -f Mobile/*.apk
          rm -f PC/*
          
          # Copy and Rename Mobile
          cp app/build/outputs/apk/debug/app-debug.apk "Mobile/X-LOCALHOST-Mobile-Elite-Edition.apk"
          
          # Copy and Rename PC (Dist folder contains the binary)
          if [ -f dist/X-LOCALHOST-PC-Workstation-Pro ]; then
            cp dist/X-LOCALHOST-PC-Workstation-Pro "PC/X-LOCALHOST-PC-Workstation-Pro"
          fi

      - name: Commit and Push Artifacts
        run: |
          git config --global user.name "Flinger Apps CI"
          git config --global user.email "ci@flingerapps.com"
          git add Mobile/ PC/
          git commit -m "Deployment: Update X-LOCALHOST Elite & Pro editions" || echo "No changes to commit"
          git push origin main

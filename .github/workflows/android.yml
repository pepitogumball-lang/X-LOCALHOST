name: X-LOCALHOST Ultra-Premium CI/CD (Signed & Professional)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Disabling cache temporarily due to GitHub service instability observed in logs
          # cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build Android APK (Release)
        run: |
          # Ensure gradlew is executable and present
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.6
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Sign Android APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build PC Version (Windows EXE)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller psutil
          # Using python -m PyInstaller to ensure it uses the correct environment
          python -m PyInstaller --onefile --windowed --name "X-LOCALHOST-PC-Workstation-Pro" pc_version.py

      - name: Sign Windows EXE (Integrity Check)
        run: |
          echo "Verifying build integrity for X-LOCALHOST-PC-Workstation-Pro..."
          mkdir -p Signed_PC
          if [ -f dist/X-LOCALHOST-PC-Workstation-Pro ]; then
            cp dist/X-LOCALHOST-PC-Workstation-Pro Signed_PC/X-LOCALHOST-PC-Workstation-Pro.exe
          else
            echo "Build failed: EXE not found"
            exit 1
          fi
        
      - name: Elite Artifact Deployment & Auto-Clean
        run: |
          rm -rf Mobile/ PC/
          mkdir -p Mobile
          mkdir -p PC
          
          # Mobile Deployment
          if [ -f "${{ steps.sign_app.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "Mobile/X-LOCALHOST-Mobile-Elite-Edition.apk"
          elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk "Mobile/X-LOCALHOST-Mobile-Elite-Edition.apk"
          fi
          
          # PC Deployment
          if [ -f Signed_PC/X-LOCALHOST-PC-Workstation-Pro.exe ]; then
            cp Signed_PC/X-LOCALHOST-PC-Workstation-Pro.exe "PC/X-LOCALHOST-PC-Workstation-Pro.exe"
          fi
          cp pc_version.py "PC/X-LOCALHOST-PC-Source.py"
          
          rm -rf dist/ build/ Signed_PC/

      - name: Corporate Sync to Elite Repository
        run: |
          git config --global user.name "Flinger Apps Elite CI"
          git config --global user.email "elite-ci@flingerapps.com"
          git add Mobile/ PC/
          git commit -m "Deployment: Fix CI/CD Workflow & Sync Professional Artifacts" || echo "No changes"
          git push origin main
